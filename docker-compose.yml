

services:
  backend:
    build: ./backend
    container_name: campus-lms-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - campus-network

  frontend:
    build: ./frontend
    container_name: campus-lms-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
    networks:
      - campus-network

# Define custom network
networks:
  campus-network:
    driver: bridge